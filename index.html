<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ο,τι να'ναι Podcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 90%;
            margin: 50px auto;
            text-align: center;
        }

        /* Styling the title with a colorful gradient */
        h1 {
            font-weight: 900;
            font-size: 3.5rem;
            margin-bottom: 0.1em;
            background: -webkit-linear-gradient(45deg, #fbbf24, #f43f5e, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Container for your logo.png */
        .logo-container {
            margin: 0 auto 40px auto;
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background-color: var(--card-bg); /* Acts as a placeholder color while loading */
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image fills the box nicely */
            display: block;
        }

        /* Styling for the platform buttons */
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            color: #ffffff;
            transition: transform 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }

        .btn-spotify { background-color: #1DB954; color: #000000; }
        .btn-apple { background-color: #FA243C; }
        .btn-patreon { background-color: #FF424D; }

        .player-container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: left;
        }

        .player-container h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ο,τι να'ναι</h1>
        <p class="subtitle">Το podcast για ο,τιδήποτε και όλα.</p>
        
        <div class="logo-container">
            <img src="logo.png" alt="Ο,τι να'ναι Podcast Logo">
        </div>

        <div class="links">
            <a href="https://open.spotify.com/show/1WlSmVwzTie97DRdw30SZm" class="btn btn-spotify" target="_blank" rel="noopener noreferrer">Spotify</a>
            <a href="https://podcasts.apple.com/podcast/id1888811986" class="btn btn-apple" target="_blank" rel="noopener noreferrer">Apple Podcasts</a>
            <a href="YOUR_PATREON_LINK_HERE" class="btn btn-patreon" target="_blank" rel="noopener noreferrer">Patreon</a>
        </div>

        <div class="player-container">
            <h2>Latest Episode</h2>
            <iframe src="https://embed.acast.com/69c841a6e05c00aacfed11c0?feed=true" frameBorder="0" width="100%" height="280px"></iframe>
        </div>
    </div>

</body>
</html>
